<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-adsense-account" content="ca-pub-1709050651667510">
    <title>yutat23.dev</title>
    <meta
      name="description"
      content="yutat23 のポートフォリオサイト。Webアプリケーション、CLIツール、ライブラリなどの制作物を紹介しています。"
    />
    <meta name="theme-color" content="#000008" />
    <meta property="og:title" content="yutat23.dev" />
    <meta
      property="og:description"
      content="yutat23 のポートフォリオサイト。Webアプリケーション、CLIツール、ライブラリなどの制作物を紹介しています。"
    />
    <meta property="og:url" content="https://yutat23.dev/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://yutat23.dev/favicon.png" />
    <meta name="twitter:card" content="summary" />
    <!-- favicon -->
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000,
          1px 1px 0 #000;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background: radial-gradient(circle at center, #002030 0%, #000008 80%);
        font-family: "Noto Sans JP", sans-serif;
      }
      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #fff;
        opacity: 0;
        animation: twinkle infinite ease-in-out;
        image-rendering: pixelated;
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
        }
        50% {
          opacity: var(--max-opacity, 1);
        }
      }
      .shooting-star {
        position: absolute;
        width: 90px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9));
        opacity: 0;
        pointer-events: none;
        transform: rotate(30deg);
      }
      .shooting-star.is-active {
        animation: shoot 0.9s linear;
      }
      @keyframes shoot {
        0% {
          opacity: 0;
          transform: rotate(30deg) translateX(0);
        }
        15% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: rotate(30deg) translateX(260px);
        }
      }
      .pixel-planet {
        position: absolute;
        image-rendering: pixelated;
        animation: float var(--float-duration, 9s) ease-in-out
          var(--float-delay, 0s) infinite;
        transition: opacity 0.3s ease;
      }
      /* ポートフォリオ表示中はリストの邪魔にならないよう惑星を薄くする */
      #home-view.is-portfolio-open .pixel-planet {
        opacity: 0.25;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      #home-view {
        position: fixed;
        inset: 0;
        z-index: 1;
      }
      #message {
        position: fixed;
        top:40%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        color: #ffffff;
        font-family: "Press Start 2P", monospace;
        font-size: 16px;
        padding: 8px 12px;
        white-space: nowrap;
        text-align: center;
        text-shadow: var(--text-shadow);
        -webkit-user-select: none;
        user-select: none;
      }
      #world-link {
        appearance: none;
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        font: inherit;
        color: inherit;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        text-shadow: var(--text-shadow);
        animation: soft-blink 2.5s ease-in-out infinite, glitch 10s ease-in-out infinite;
      }
      #world-link:disabled {
        cursor: default;
        animation: none;
        transform: translate(0);
        text-shadow: var(--text-shadow);
      }
      @keyframes glitch {
        0%, 94%, 100% {
          text-shadow: var(--text-shadow);
          transform: translate(0);
        }
        95% {
          text-shadow: -2px 0 rgba(255, 0, 128, 0.9), 2px 0 rgba(0, 255, 255, 0.9), var(--text-shadow);
          transform: translate(-2px, 1px);
        }
        95.5% {
          text-shadow: 2px 0 rgba(0, 255, 255, 0.9), -2px 0 rgba(255, 0, 128, 0.9), var(--text-shadow);
          transform: translate(2px, -1px);
        }
        96% {
          text-shadow: -1px 0 rgba(255, 0, 128, 0.7), 1px 0 rgba(0, 255, 255, 0.7), var(--text-shadow);
          transform: translate(-1px, 0);
        }
        96.5% {
          text-shadow: 1px 0 rgba(0, 255, 255, 0.7), -1px 0 rgba(255, 0, 128, 0.7), var(--text-shadow);
          transform: translate(1px, 1px);
        }
        97% {
          text-shadow: var(--text-shadow);
          transform: translate(0);
        }
      }
      #world-link:hover {
        opacity: 0.85;
        transform: translate(0);
        text-shadow: var(--text-shadow);
        animation: none;
      }
      #portfolio-section {
        display: flex;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        position: fixed;
        top: calc(38% + 36px);
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        transition: opacity 0.3s ease, transform 0.3s ease,
          visibility 0s linear 0.3s;
        z-index: 10;
        text-align: left;
        width: min(95vw, 600px);
        flex-direction: column;
        overflow: hidden;
        background: rgba(0, 8, 24, 0.15);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 8px;
        padding: 8px 0 0 0;
        mask-image: radial-gradient(ellipse 90% 95% at 50% 50%, black 40%, transparent 100%);
        -webkit-mask-image: radial-gradient(ellipse 90% 95% at 50% 50%, black 40%, transparent 100%);
      }
      #portfolio-section.is-visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
        transition: opacity 0.3s ease, transform 0.3s ease;
      }
      #portfolio-list {
        flex: 1;
        min-height: 0;
        overflow-y: scroll;
        overflow-x: hidden;
        padding: 0 16px;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        scrollbar-width: thin;
        scrollbar-color: rgba(94, 231, 255, 0.6) transparent;
      }
      #portfolio-list::-webkit-scrollbar {
        width: 6px;
      }
      #portfolio-list::-webkit-scrollbar-track {
        background: transparent;
      }
      #portfolio-list::-webkit-scrollbar-thumb {
        background: rgba(94, 231, 255, 0.5);
        border-radius: 3px;
      }
      #portfolio-list::-webkit-scrollbar-thumb:hover {
        background: rgba(94, 231, 255, 0.8);
      }
      #portfolio-section .portfolio-category {
        margin: 24px 0 12px 0;
        font-family: "DotGothic16", "Noto Sans JP", sans-serif;
        font-size: 14px;
        letter-spacing: 2px;
        color: #ffcf6e;
        text-shadow: var(--text-shadow);
      }
      #portfolio-section .portfolio-category:first-child {
        margin-top: 0;
      }
      #portfolio-section ul.portfolio-list {
        list-style: none;
        margin: 0 0 16px 0;
        padding: 0;
        text-align: left;
      }
      #portfolio-section .portfolio-item {
        margin: 0 -8px 4px -8px;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 14px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.95);
        transition: background 0.2s ease;
      }
      #portfolio-section .portfolio-item:hover {
        background: rgba(94, 231, 255, 0.08);
      }
      #portfolio-section .portfolio-item a {
        color: #5ee7ff;
        text-decoration: none;
        text-shadow: var(--text-shadow);
      }
      #portfolio-section .portfolio-item a:hover {
        text-decoration: underline;
        color: #8eefff;
      }
      #portfolio-section .portfolio-item .sep {
        color: rgba(255, 255, 255, 0.85);
        margin: 0 6px;
      }
      #back-link {
        appearance: none;
        background: none;
        border: none;
        margin: 0;
        font-family: inherit;
        cursor: pointer;
        flex-shrink: 0;
        padding: 12px 0 8px 0;
        color: rgba(255, 255, 255, 0.95);
        font-size: 12px;
        text-decoration: none;
        text-shadow: var(--text-shadow);
      }
      #back-link:hover {
        color: #fff;
      }
      /* CRTスキャンライン風オーバーレイ */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 100;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.16) 0,
          rgba(0, 0, 0, 0.16) 1px,
          transparent 1px,
          transparent 3px
        );
      }
      @media (prefers-reduced-motion: reduce) {
        .star {
          animation: none;
          opacity: 0.7;
        }
        #world-link,
        .pixel-planet {
          animation: none;
        }
        .shooting-star {
          display: none;
        }
        #portfolio-section,
        #portfolio-section.is-visible {
          transition: none;
        }
      }
      @media (max-width: 480px) {
        #message {
          top: 20%;
          transform: translate(-50%, 0);
        }
        #portfolio-section {
          top: calc(20% + 36px);
          bottom: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="home-view">
      <div id="message">
        HELLO
        <button
          id="world-link"
          type="button"
          aria-expanded="false"
          aria-controls="portfolio-section"
        >
          WORLD
        </button>
      </div>
      <div id="portfolio-section" aria-hidden="true">
        <div id="portfolio-list"></div>
        <button id="back-link" type="button" aria-label="戻る">← Back</button>
      </div>
    </div>
    <script>
      const homeView = document.getElementById("home-view");
      const numStars = 200;
      for (let i = 0; i < numStars; i++) {
        const star = document.createElement("div");
        star.className = "star";
        const starSize = [1, 1, 1, 2, 2, 3][Math.floor(Math.random() * 6)];
        star.style.width = starSize + "px";
        star.style.height = starSize + "px";
        star.style.setProperty(
          "--max-opacity",
          (0.4 + Math.random() * 0.6).toFixed(2)
        );
        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";
        star.style.animationDuration = Math.random() * 2 + 1 + "s";
        star.style.animationDelay = Math.random() * 5 + "s";
        homeView.appendChild(star);
      }

      const planetTypes = [
        { size: 20, color: "#00eeee" },
        { size: 16, color: "#b22222", craters: true },
        { size: 18, color: "#f4a460", craters: true },
        { size: 30, color: "#ffa500", ring: true },
        { size: 26, color: "#ff6347" },
        { size: 32, color: "#4682b4", craters: true },
        { size: 34, color: "#0fe060" },
      ];

      // factor < 1 で暗く、> 1 で白に近づける
      function shadeColor(hex, factor) {
        const n = parseInt(hex.slice(1), 16);
        const ch = (v) =>
          factor <= 1
            ? Math.round(v * factor)
            : Math.round(v + (255 - v) * (factor - 1));
        return `rgb(${ch((n >> 16) & 255)}, ${ch((n >> 8) & 255)}, ${ch(n & 255)})`;
      }

      function createPixelPlanet({ size, color, ring, craters }) {
        const res = Math.floor(size / 2);
        const r = res / 2;
        const ringPad = ring ? Math.round(res * 0.6) : 0;
        const canvas = document.createElement("canvas");
        canvas.width = res + ringPad * 2;
        canvas.height = res;
        canvas.className = "pixel-planet";
        const cssW = canvas.width * 2;
        const cssH = canvas.height * 2;
        canvas.style.width = cssW + "px";
        canvas.style.height = cssH + "px";
        canvas.style.setProperty(
          "--float-duration",
          (7 + Math.random() * 6).toFixed(1) + "s"
        );
        canvas.style.setProperty(
          "--float-delay",
          (-Math.random() * 10).toFixed(1) + "s"
        );
        homeView.appendChild(canvas);
        const ctx = canvas.getContext("2d");

        // クレーターの位置とサイズを事前に決める(惑星中心からの相対座標)
        const craterList = craters
          ? Array.from({ length: 3 }, () => ({
              x: (Math.random() - 0.5) * res * 0.9,
              y: (Math.random() - 0.5) * res * 0.9,
              r: r * (0.15 + Math.random() * 0.15),
            }))
          : [];

        for (let y = 0; y < res; y++) {
          for (let x = 0; x < res; x++) {
            const dx = x - r + 0.5;
            const dy = y - r + 0.5;
            if (dx * dx + dy * dy > r * r) continue;
            // 左上の光源からの距離で階調を決める
            const lx = dx + r * 0.4;
            const ly = dy + r * 0.4;
            const d = Math.sqrt(lx * lx + ly * ly) / r;
            let factor;
            if (d < 0.5) factor = 1.35;
            else if (d < 1.05) factor = 1;
            else if (d < 1.45) factor = 0.72;
            else factor = 0.5;
            if (
              craterList.some(
                (c) => (dx - c.x) ** 2 + (dy - c.y) ** 2 <= c.r * c.r
              )
            ) {
              factor *= 0.72;
            }
            ctx.fillStyle = shadeColor(color, factor);
            ctx.fillRect(x + ringPad, y, 1, 1);
          }
        }

        if (ring) {
          const cx = canvas.width / 2;
          const aOuter = r + ringPad * 0.9;
          const aInner = r + ringPad * 0.3;
          const flat = 0.32; // リングのつぶれ具合
          for (let y = 0; y < canvas.height; y++) {
            for (let x = 0; x < canvas.width; x++) {
              const ex = x - cx + 0.5;
              const ey = y - r + 0.5;
              const vOuter = (ex / aOuter) ** 2 + (ey / (aOuter * flat)) ** 2;
              const vInner = (ex / aInner) ** 2 + (ey / (aInner * flat)) ** 2;
              if (vOuter > 1 || vInner < 1) continue;
              // 上半分は惑星の裏に隠し、下半分だけ手前に重ねる
              const onPlanet = ex * ex + ey * ey <= r * r;
              if (onPlanet && ey < 0) continue;
              ctx.fillStyle = shadeColor(color, ey < 0 ? 1.25 : 1.5);
              ctx.fillRect(x, y, 1, 1);
            }
          }
        }

        const msgRect = document.getElementById("message").getBoundingClientRect();
        const margin = 20;
        const maxX = window.innerWidth - cssW - margin;
        const maxY = window.innerHeight - cssH - margin;

        let x, y;
        do {
          x = margin + Math.random() * maxX;
          y = margin + Math.random() * maxY;
        } while (
          x + cssW > msgRect.left &&
          x < msgRect.right &&
          y + cssH > msgRect.top &&
          y < msgRect.bottom
        );

        canvas.style.left = x + "px";
        canvas.style.top = y + "px";
      }

      // Webフォント読み込み後にメッセージの実寸を測って惑星を配置する
      document.fonts.ready.then(() => {
        planetTypes.forEach(createPixelPlanet);
      });

      // 流れ星(動きを減らす設定のときは出さない)
      (function () {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          return;
        }
        const shootingStar = document.createElement("div");
        shootingStar.className = "shooting-star";
        homeView.appendChild(shootingStar);
        function launch() {
          shootingStar.style.left = Math.random() * 70 + "%";
          shootingStar.style.top = Math.random() * 40 + "%";
          shootingStar.classList.remove("is-active");
          void shootingStar.offsetWidth; // アニメーションを頭から再生し直す
          shootingStar.classList.add("is-active");
          setTimeout(launch, 6000 + Math.random() * 14000);
        }
        setTimeout(launch, 3000 + Math.random() * 5000);
      })();

      (function () {
        const worldLink = document.getElementById("world-link");
        const backLink = document.getElementById("back-link");
        const portfolioSection = document.getElementById("portfolio-section");
        const portfolioList = document.getElementById("portfolio-list");

        const CATEGORY_ORDER = ["Webアプリケーション", "CLI", "GUIアプリケーション", "ライブラリ"];

        function togglePortfolio() {
          const isOpen = portfolioSection.classList.toggle("is-visible");
          worldLink.textContent = isOpen ? "WORKS" : "WORLD";
          worldLink.setAttribute("aria-expanded", isOpen);
          portfolioSection.setAttribute("aria-hidden", !isOpen);
          homeView.classList.toggle("is-portfolio-open", isOpen);
        }

        function disableWorldLink() {
          worldLink.disabled = true;
        }

        function createExternalLink(href, text) {
          const a = document.createElement("a");
          a.href = href;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = text;
          return a;
        }

        function createSep(text) {
          const sep = document.createElement("span");
          sep.className = "sep";
          sep.textContent = text;
          return sep;
        }

        function renderItem(item) {
          const li = document.createElement("li");
          li.className = "portfolio-item";
          li.appendChild(createExternalLink(item.url, item.name));
          if (item.siteUrl) {
            li.appendChild(createSep("·"));
            li.appendChild(createExternalLink(item.siteUrl, item.siteUrl));
          }
          if (item.description) {
            li.appendChild(createSep("—"));
            const desc = document.createElement("span");
            desc.textContent = item.description;
            li.appendChild(desc);
          }
          return li;
        }

        function groupByCategory(items) {
          const groups = {};
          items.forEach((item) => {
            const cat = item.category || "その他";
            (groups[cat] ??= []).push(item);
          });
          const ordered = CATEGORY_ORDER.filter((c) => groups[c]);
          const rest = Object.keys(groups).filter((c) => !CATEGORY_ORDER.includes(c));
          return [...ordered, ...rest].map((cat) => ({ category: cat, items: groups[cat] }));
        }

        worldLink.addEventListener("click", (e) => {
          e.preventDefault();
          togglePortfolio();
        });
        backLink.addEventListener("click", (e) => {
          e.preventDefault();
          togglePortfolio();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && portfolioSection.classList.contains("is-visible")) {
            togglePortfolio();
          }
        });

        fetch("portfolio.json")
          .then((res) => {
            if (!res.ok) {
              throw new Error(`portfolio.json の取得に失敗しました (${res.status})`);
            }
            return res.json();
          })
          .then((items) => {
            if (items.length === 0) {
              disableWorldLink();
              return;
            }
            groupByCategory(items).forEach(({ category, items: catItems }) => {
              const heading = document.createElement("div");
              heading.className = "portfolio-category";
              heading.textContent = category;
              portfolioList.appendChild(heading);

              const ul = document.createElement("ul");
              ul.className = "portfolio-list";
              catItems.forEach((item) => ul.appendChild(renderItem(item)));
              portfolioList.appendChild(ul);
            });
          })
          .catch(disableWorldLink);
      })();
    </script>
  </body>
</html>
